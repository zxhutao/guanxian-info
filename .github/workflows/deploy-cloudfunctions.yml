name: ☁️ 云函数部署 (CD)

on:
  push:
    branches: [ master ]
    paths:
      - 'uniCloud-tcb/cloudfunctions/**'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: '是否部署所有云函数'
        required: false
        default: 'false'
        type: boolean
      function_name:
        description: '指定部署的云函数名称（留空则自动检测变更）'
        required: false
        type: string

env:
  CLOUDBASE_ENV_ID: cloudbase-1gkioadld4516142

jobs:
  # ─────────────────────────────────────────
  # 检测变更的云函数
  # ─────────────────────────────────────────
  detect-changes:
    name: 🔍 检测变更
    runs-on: ubuntu-latest
    outputs:
      changed_functions: ${{ steps.detect.outputs.functions }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检测变更的云函数
        id: detect
        run: |
          if [ "${{ github.event.inputs.deploy_all }}" = "true" ]; then
            # 手动触发且选择全量部署
            functions=$(ls uniCloud-tcb/cloudfunctions/ | grep -v '\.json\|\.js\|\.md\|\.jql\|\.zip' | tr '\n' ',')
            echo "🚀 全量部署模式: $functions"
          elif [ -n "${{ github.event.inputs.function_name }}" ]; then
            # 指定函数名
            functions="${{ github.event.inputs.function_name }}"
            echo "🎯 指定部署: $functions"
          else
            # 自动检测变更
            changed=$(git diff --name-only HEAD~1 HEAD -- 'uniCloud-tcb/cloudfunctions/' 2>/dev/null || \
                      git diff --name-only HEAD -- 'uniCloud-tcb/cloudfunctions/')
            functions=$(echo "$changed" | grep -oP 'uniCloud-tcb/cloudfunctions/\K[^/]+' | sort -u | tr '\n' ',')
            echo "📋 变更检测: $functions"
          fi
          
          if [ -z "$functions" ] || [ "$functions" = "," ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "functions=" >> $GITHUB_OUTPUT
            echo "ℹ️  没有检测到云函数变更"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "functions=$functions" >> $GITHUB_OUTPUT
            echo "✅ 需要部署的函数: $functions"
          fi

  # ─────────────────────────────────────────
  # 部署云函数
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 部署云函数
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest
          tcb --version

      - name: 登录腾讯云 CloudBase
        run: |
          # 使用 GitHub Secrets 中配置的密钥登录
          tcb login --apiKeyId "${{ secrets.TENCENT_SECRET_ID }}" \
                    --apiKey "${{ secrets.TENCENT_SECRET_KEY }}"
        env:
          CLOUDBASE_ENV_ID: ${{ env.CLOUDBASE_ENV_ID }}

      - name: 安装云函数依赖
        run: |
          functions="${{ needs.detect-changes.outputs.changed_functions }}"
          IFS=',' read -ra func_list <<< "$functions"
          
          for func in "${func_list[@]}"; do
            func=$(echo "$func" | tr -d ' ')
            if [ -z "$func" ]; then continue; fi
            
            func_dir="uniCloud-tcb/cloudfunctions/$func"
            if [ -d "$func_dir" ] && [ -f "${func_dir}/package.json" ]; then
              echo "📦 安装 $func 依赖..."
              cd "$func_dir"
              npm install --production
              cd - > /dev/null
            fi
          done

      - name: 部署变更的云函数
        run: |
          functions="${{ needs.detect-changes.outputs.changed_functions }}"
          IFS=',' read -ra func_list <<< "$functions"
          
          DEPLOY_SUCCESS=0
          DEPLOY_FAIL=0
          FAIL_NAMES=""
          
          for func in "${func_list[@]}"; do
            func=$(echo "$func" | tr -d ' ')
            if [ -z "$func" ]; then continue; fi
            
            func_dir="uniCloud-tcb/cloudfunctions/$func"
            if [ ! -d "$func_dir" ]; then
              echo "⚠️  跳过: $func (目录不存在)"
              continue
            fi
            
            echo "🚀 正在部署: $func ..."
            
            # 使用 CloudBase CLI 部署云函数
            if tcb fn deploy "$func" \
                --envId "${{ env.CLOUDBASE_ENV_ID }}" \
                --path "$func_dir" \
                --force 2>&1; then
              echo "✅ $func 部署成功"
              DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))
            else
              echo "❌ $func 部署失败"
              DEPLOY_FAIL=$((DEPLOY_FAIL + 1))
              FAIL_NAMES="$FAIL_NAMES $func"
            fi
            
            echo "---"
          done
          
          echo ""
          echo "📊 部署结果:"
          echo "   ✅ 成功: $DEPLOY_SUCCESS 个"
          echo "   ❌ 失败: $DEPLOY_FAIL 个 $FAIL_NAMES"
          
          if [ $DEPLOY_FAIL -gt 0 ]; then
            exit 1
          fi

      - name: 验证部署结果
        run: |
          echo "🔍 验证云函数部署..."
          functions="${{ needs.detect-changes.outputs.changed_functions }}"
          IFS=',' read -ra func_list <<< "$functions"
          
          for func in "${func_list[@]}"; do
            func=$(echo "$func" | tr -d ' ')
            if [ -z "$func" ]; then continue; fi
            
            result=$(tcb fn list --envId "${{ env.CLOUDBASE_ENV_ID }}" 2>/dev/null | grep "$func" || echo "")
            if [ -n "$result" ]; then
              echo "✅ $func - 已确认部署"
            else
              echo "⚠️  $func - 无法确认部署状态"
            fi
          done

  # ─────────────────────────────────────────
  # 部署通知
  # ─────────────────────────────────────────
  notify:
    name: 📢 部署通知
    runs-on: ubuntu-latest
    needs: [ detect-changes, deploy ]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: 发送部署结果通知
        run: |
          deploy_status="${{ needs.deploy.result }}"
          functions="${{ needs.detect-changes.outputs.changed_functions }}"
          
          if [ "$deploy_status" = "success" ]; then
            status_icon="✅"
            status_text="部署成功"
          else
            status_icon="❌"
            status_text="部署失败"
          fi
          
          echo "${status_icon} 冠帮帮云函数部署完成"
          echo "状态: $status_text"
          echo "部署函数: $functions"
          echo "环境: ${{ env.CLOUDBASE_ENV_ID }}"
          echo "触发者: ${{ github.actor }}"
          echo "提交: ${{ github.sha }}"
          
          # 如果配置了钉钉 Webhook，发送通知
          if [ -n "${{ secrets.DINGTALK_WEBHOOK }}" ]; then
            message="{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"${status_icon} 冠帮帮云函数部署\",
                \"text\": \"### ${status_icon} 冠帮帮云函数部署\\n**状态**: ${status_text}\\n**函数**: ${functions}\\n**触发者**: ${{ github.actor }}\\n**提交**: ${{ github.sha }}\"
              }
            }"
            curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
                 -H "Content-Type: application/json" \
                 -d "$message" || true
          fi
